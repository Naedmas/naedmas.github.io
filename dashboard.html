<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard • Naedmas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap');
        body { font-family: 'Inter', system_ui, sans-serif; }
        .logo-font { font-family: 'Space Grotesk', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.06); backdrop-filter: blur(16px); }
    </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen flex">
    <!-- Sidebar -->
    <div class="w-72 bg-zinc-900 border-r border-white/10 h-screen fixed flex flex-col">
        <div class="p-6 flex items-center gap-x-3 border-b border-white/10">
            <div class="w-10 h-10 bg-violet-600 rounded-2xl flex items-center justify-center text-3xl font-bold">N</div>
            <div>
                <span class="text-3xl font-semibold tracking-tighter logo-font">naedmas</span>
            </div>
        </div>

        <div class="flex-1 overflow-y-auto py-6 px-3">
            <div class="px-3 mb-2 text-xs uppercase tracking-widest text-zinc-500 font-medium">Core</div>
            <a href="#" class="sidebar-link active flex items-center gap-x-3 px-6 py-3.5 rounded-2xl text-lg font-medium mb-1">
                <i class="fas fa-home w-5"></i><span>Dashboard</span>
            </a>
            <!-- Add more links as needed -->
        </div>

        <div class="p-4 border-t border-white/10">
            <button onclick="logout()" 
                    class="w-full py-3 text-red-400 hover:bg-red-500/10 rounded-2xl transition-all flex items-center justify-center gap-2">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>
        </div>
    </div>

    <!-- Main Content -->
    <div class="flex-1 ml-72">
        <header class="h-16 border-b border-white/10 bg-zinc-900/80 backdrop-blur-lg fixed right-0 left-72 z-50 flex items-center px-8">
            <div class="flex-1"></div>
            <div id="userInfo" class="flex items-center gap-x-3 text-sm"></div>
        </header>

        <main class="pt-24 pb-12 px-8 max-w-screen-2xl mx-auto">
            <h1 class="text-5xl font-semibold tracking-tight logo-font mb-2">Welcome back</h1>
            <p id="welcomeText" class="text-zinc-400 text-xl"></p>

            <!-- Your existing dashboard content goes here -->
            <div class="mt-12 glass border border-white/10 rounded-3xl p-8">
                <h2 class="text-2xl font-semibold mb-6">Protected Dashboard</h2>
                <p class="text-zinc-400">This page is now secured with Firebase Authentication.</p>
                <!-- Add your previous dashboard sections here -->
            </div>
        </main>
    </div>

    <script>
        // Your Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyBgBh6tl0HSqWTeWxqll2Pd8vKKr-HV7-A",
            authDomain: "naedmas-ab1c9.firebaseapp.com",
            projectId: "naedmas-ab1c9",
            storageBucket: "naedmas-ab1c9.firebasestorage.app",
            messagingSenderId: "818829278172",
            appId: "1:818829278172:web:cebd2284efb823ae832d19"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        // Check authentication status
        function checkAuth() {
            auth.onAuthStateChanged(user => {
                if (!user) {
                    // Not logged in → redirect to login
                    window.location.href = "index.html";
                } else {
                    // User is logged in
                    document.getElementById('welcomeText').textContent = `Signed in as ${user.email}`;
                    document.getElementById('userInfo').innerHTML = `
                        <span class="text-emerald-400">${user.email}</span>
                        <div class="w-8 h-8 bg-zinc-700 rounded-2xl flex items-center justify-center text-lg">👤</div>
                    `;
                }
            });
        }

        function logout() {
            if (confirm("Sign out of naedmas.com?")) {
                auth.signOut().then(() => {
                    window.location.href = "index.html";
                });
            }
        }

        // Initialize
        window.onload = checkAuth;
    </script>
</body>
</html>

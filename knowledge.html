            </div>

            </div>

            <div id="notesList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </main>
    </div>

    <!-- Article Modal -->
    <div id="noteModal" class="hidden fixed inset-0 bg-black/95 backdrop-blur-xl z-[200] flex items-center justify-center">
        <div class="glass border border-white/10 rounded-3xl w-full max-w-4xl mx-4 max-h-[92vh] overflow-hidden flex flex-col">
            <div class="p-6 border-b border-white/10 flex justify-between">
                <input id="noteTitle" class="flex-1 bg-transparent text-3xl font-semibold outline-none" placeholder="Article Title">
                <div class="flex gap-4">
                    <button onclick="deleteCurrentNote()" class="text-red-400 hover:text-red-500"><i class="fas fa-trash"></i></button>
                    <button onclick="closeNoteModal()" class="text-3xl text-zinc-400 hover:text-white">×</button>
                </div>
            </div>

            <div class="px-8 pt-4">
                <input id="noteImage" type="url" class="w-full bg-zinc-900 border border-white/20 rounded-2xl px-5 py-3 text-sm" placeholder="Featured Image URL (optional)">
            </div>

            <div class="flex-1 p-8 overflow-auto">
                <textarea id="noteContent" class="w-full h-full bg-transparent outline-none text-lg resize-none" 
                          placeholder="Write your article here..."></textarea>
            </div>

            <div class="p-6 border-t border-white/10 flex justify-end gap-4">
                <button onclick="closeNoteModal()" class="px-8 py-4 text-zinc-400">Cancel</button>
                <button onclick="saveNote()" class="px-8 py-4 bg-white text-zinc-900 font-semibold rounded-2xl">Save Article</button>

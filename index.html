<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        .hero-bg { 
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%); 
        }
        .glass { 
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(20px); 
        }
    </style>
</head>
<body class="bg-zinc-950 text-white font-sans">
    <!-- Minimal Navbar -->
    <nav class="fixed top-0 left-0 right-0 z-50 border-b border-white/10 bg-zinc-950/80 backdrop-blur-lg">
        <div class="max-w-screen-2xl mx-auto px-8 py-5 flex items-center justify-between">
            <div class="flex items-center gap-x-3">
                <div class="w-8 h-8 bg-zinc-700 rounded-2xl flex items-center justify-center text-xl font-bold">N</div>
                <span class="text-2xl font-semibold tracking-tight">naedmas</span>
            </div>
            
            <button onclick="showLoginModal()" 
                    class="px-8 py-3 text-sm font-medium bg-white text-zinc-900 rounded-2xl hover:bg-zinc-200 transition-all">
                Sign In
            </button>
        </div>
    </nav>

    <!-- Hero / Landing -->
    <section class="hero-bg min-h-screen flex items-center">
        <div class="max-w-screen-2xl mx-auto px-8 text-center">
            <div class="max-w-md mx-auto">
                <div class="mx-auto w-20 h-20 bg-zinc-800 rounded-3xl flex items-center justify-center text-5xl mb-10">🔒</div>
                
                <h1 class="text-6xl font-semibold tracking-tighter mb-6">Secure Access</h1>
                
                <p class="text-zinc-400 text-lg mb-12">
                    Authorized personnel only.
                </p>
                
                <button onclick="showLoginModal()" 
                        class="w-full py-6 bg-white text-zinc-900 font-semibold text-xl rounded-3xl hover:bg-zinc-100 transition-all active:scale-95">
                    Proceed to Login
                </button>
                
                <p class="text-xs text-zinc-600 mt-16">
                    © naedmas.com • All rights reserved
                </p>
            </div>
        </div>
    </section>

    <!-- Login Modal -->
    <div id="loginModal" class="hidden fixed inset-0 bg-black/95 backdrop-blur-xl z-[100] flex items-center justify-center">
        <div class="glass border border-white/10 rounded-3xl w-full max-w-md p-10 relative">
            <button onclick="hideLoginModal()" 
                    class="absolute top-6 right-6 text-4xl text-zinc-400 hover:text-white leading-none">×</button>
            
            <div class="text-center mb-10">
                <div class="mx-auto w-16 h-16 bg-zinc-700 rounded-2xl flex items-center justify-center text-4xl mb-6">🔑</div>
                <h3 class="text-3xl font-semibold">Sign In</h3>
                <p class="text-zinc-500 mt-2">Restricted Area</p>
            </div>

            <div class="space-y-6">
                <div>
                    <label class="block text-xs uppercase tracking-widest text-zinc-500 mb-2">Username</label>
                    <input id="username" type="text" 
                           class="w-full bg-zinc-900 border border-white/20 rounded-2xl px-6 py-5 outline-none focus:border-white text-lg"
                           placeholder="Username">
                </div>
                <div>
                    <label class="block text-xs uppercase tracking-widest text-zinc-500 mb-2">Password</label>
                    <input id="password" type="password" 
                           class="w-full bg-zinc-900 border border-white/20 rounded-2xl px-6 py-5 outline-none focus:border-white text-lg"
                           placeholder="Password">
                </div>

                <button onclick="handleLogin()" 
                        class="w-full py-6 bg-white text-zinc-950 font-semibold text-lg rounded-3xl hover:bg-zinc-200 transition-all">
                    Sign In
                </button>
            </div>
        </div>
    </div>

    <script>
        const VALID_CREDENTIALS = {
            "naedmas": "demo123",
            "admin": "admin123"
        };

        function showLoginModal() {
            const modal = document.getElementById('loginModal');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
            document.getElementById('username').focus();
        }

        function hideLoginModal() {
            const modal = document.getElementById('loginModal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }

        function handleLogin() {
            const username = document.getElementById('username').value.trim().toLowerCase();
            const password = document.getElementById('password').value;

            if (VALID_CREDENTIALS[username] && VALID_CREDENTIALS[username] === password) {
                hideLoginModal();
                
                const overlay = document.createElement('div');
                overlay.innerHTML = `
                    <div class="fixed inset-0 bg-black/90 flex items-center justify-center z-[200]">
                        <div class="text-center">
                            <div class="text-6xl mb-8 animate-bounce">✅</div>
                            <div class="text-3xl font-medium">Access Granted</div>
                            <div class="text-zinc-400 mt-3">Redirecting...</div>
                        </div>
                    </div>
                `;
                document.body.appendChild(overlay.firstElementChild);

                setTimeout(() => {
                    window.location.href = "dashboard.html";
                }, 1300);
            } else {
                const btn = document.querySelector('button[onclick="handleLogin()"]');
                const originalText = btn.textContent;
                btn.style.backgroundColor = '#b91c1c';
                btn.textContent = 'Access Denied';
                
                setTimeout(() => {
                    btn.style.backgroundColor = '';
                    btn.textContent = originalText;
                }, 2000);
            }
        }

        // Keyboard support
        document.addEventListener('keydown', (e) => {
            if (e.key === "Enter") {
                const modal = document.getElementById('loginModal');
                if (!modal.classList.contains('hidden')) handleLogin();
            }
            if (e.key === "Escape") hideLoginModal();
        });
    </script>
</body>
</html>
